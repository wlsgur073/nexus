services:
  platform:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    command: pnpm turbo dev --filter=@nexus/platform
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development

  codex-web:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    command: pnpm turbo dev --filter=@nexus/codex-web
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development

  nginx:
    image: nginx:alpine
    ports:
      - "3080:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - platform
      - codex-web
